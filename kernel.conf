# BikerOS Kernel Configuration
CONFIG_SECURITY=y
CONFIG_SECURITY_HARDENED_USERCOPY=y
CONFIG_GRKERNSEC=y
CONFIG_GRKERNSEC_FORCE=y

# TPM 2.0 Support
CONFIG_TCG_TPM=y
CONFIG_TCG_TPM2=y
CONFIG_TCG_TPM_APUE=y

# Performance Optimizations
CONFIG_HIGH_RES_TIMERS=y
CONFIG_SCHED_AUTOGROUP=y
CONFIG_HZ_1000=y

# Additional kernel options can be specified as needed
